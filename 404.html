<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://raw.githubusercontent.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' https://prod.rexxit.net https://web-platforms.sfo2.cdn.digitaloceanspaces.com data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://raw.githubusercontent.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';">
    <title>404 - Page Not Found | DriverHub</title>
    <script>
        (function() {
            const userPreference = localStorage.getItem('darkMode');
            const prefersDarkScheme = window.matchMedia("(prefers-color-scheme: dark)").matches;
            if (userPreference === 'dark' || (userPreference === null && prefersDarkScheme)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>

    <link rel="stylesheet" href="/global/tailwind.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="shortcut icon" type="image/x-icon" href="global/favicon.ico">
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 min-h-screen flex flex-col">
    <header class="sticky top-0 z-40 bg-white/80 dark:bg-gray-950/80 backdrop-blur-xl border-b border-gray-200/50 dark:border-gray-800/50">
        <div class="max-w-6xl mx-auto px-4 md:px-6">
            <div class="flex items-center justify-between h-16">
                <a href="/" class="flex items-center gap-3 group">
                    <img src="https://prod.rexxit.net/global/_icons/DH-logo-optim.webp" alt="DriverHub" class="h-9 w-9 transition-transform group-hover:scale-110">
                    <span class="text-xl font-bold bg-gradient-to-r from-primary-600 to-primary-500 bg-clip-text text-transparent">DriverHub</span>
                </a>
                <div class="flex items-center gap-2">
                    <button id="darkModeToggle" class="p-2.5 rounded-xl bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-400 transition-all duration-200" title="Toggle dark mode">
                        <span class="material-icons text-xl">dark_mode</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center">
        <div class="text-center px-4">
            <span class="material-icons text-8xl text-gray-300 dark:text-gray-600 mb-4 block">error_outline</span>
            <h1 class="text-8xl md:text-9xl font-extrabold mb-4">
                <span class="bg-gradient-to-r from-primary-500 via-purple-500 to-pink-500 bg-clip-text text-transparent">404</span>
            </h1>
            <h2 class="text-2xl md:text-3xl font-bold text-gray-900 dark:text-white mb-4">Page Not Found</h2>
            <p class="text-lg text-gray-600 dark:text-gray-400 mb-8 max-w-md mx-auto">The page you're looking for doesn't exist or has been moved.</p>
            <a href="/" class="inline-flex items-center gap-2 px-8 py-4 bg-gradient-to-r from-primary-500 to-primary-600 text-white font-semibold rounded-xl shadow-lg shadow-primary-500/25 hover:shadow-xl hover:shadow-primary-500/40 hover:-translate-y-0.5 transition-all duration-200">
                <span class="material-icons">home</span>
                Back to Home
            </a>
        </div>
    </main>

    <footer class="bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-800">
        <div class="max-w-6xl mx-auto px-4 md:px-6 py-8">
            <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                <span class="text-sm text-gray-500 dark:text-gray-400" id="site-version"></span>
                <div class="flex items-center gap-6 text-sm">
                    <a href="https://docs.rexxit.net/drivers-website/releasenotes" target="_blank" rel="noopener noreferrer" class="text-gray-500 hover:text-primary-500 transition-colors">Release Notes</a>
                    <a href="/sitemap.xml" class="text-gray-500 hover:text-primary-500 transition-colors">Sitemap</a>
                    <a href="https://www.buymeacoffee.com/burnttoasters" target="_blank" rel="noopener noreferrer" class="px-4 py-2 bg-gradient-to-r from-pink-500 to-red-500 text-white rounded-full text-sm font-medium hover:shadow-lg hover:shadow-pink-500/25 transition-all">Support</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="global/darkMode.js"></script>
    <script src="global/versionInfo.js"></script>
</body>
</html>
