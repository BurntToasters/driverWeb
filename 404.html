<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | DriverHub.win</title>
    <script>
        (function() {
            const userPreference = localStorage.getItem('darkMode');
            const prefersDarkScheme = window.matchMedia("(prefers-color-scheme: dark)").matches;
            const shouldUseDarkMode = userPreference === 'dark' || (userPreference === null && prefersDarkScheme);
            if (shouldUseDarkMode) {
                document.documentElement.classList.add('dark-mode');
            }
        })();
    </script>
    <link rel="stylesheet" href="global/v5.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="shortcut icon" type="image/x-icon" href="global/favicon.ico">
</head>
<body>
    <header>
        <div class="header-top">
            <div class="logo-group">
                <a href="/">
                    <img src="https://prod.rexxit.net/global/_icons/DH-logo-optim.webp" alt="DriverHub Logo" class="logo">
                </a>
                <span class="site-name">DriverHub.win</span>
            </div>
            <div class="header-actions">
                <div id="region-indicator" class="region-badge" title="Click to change region">🇺🇸 USA</div>
                <button class="icon-btn" id="darkModeToggle" aria-label="Toggle dark mode">
                    <span class="material-icons">dark_mode</span>
                </button>
            </div>
        </div>
        <nav id="main-nav"></nav>
    </header>

    <main>
        <div class="error-page">
            <span class="material-icons error-icon">error_outline</span>
            <h1>404</h1>
            <h2>Page Not Found</h2>
            <p>The page you're looking for doesn't exist or has been moved.</p>
            <a href="/" class="btn btn-primary">
                <span class="material-icons">home</span> Back to Home
            </a>
        </div>
    </main>

    <footer>
        <p><span id="site-version"></span> · <a href="https://docs.rexxit.net/drivers-website/releasenotes" target="_blank">Release Notes</a></p>
        <p id="update-date"></p>
        <p><a href="https://www.buymeacoffee.com/burnttoasters" target="_blank">❤️ Support</a> · <a href="/sitemap.xml">Sitemap</a></p>
    </footer>

    <script src="global/navigation.js"></script>
    <script src="global/darkMode.js"></script>
    <script src="global/regionSwitcher.js"></script>
    <script src="global/versionInfo.js"></script>
</body>
</html>
